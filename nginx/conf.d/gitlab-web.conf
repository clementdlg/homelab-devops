# ==============================
# GITLAB WEB UI & API ROUTING
# ==============================

upstream gitlab_backend {
    server 172.30.0.12:80; # gitlab service ip
}

server {
    listen 80;
    server_name gitlab.krem.lan;
    
	# location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Virtual Host ---
server {
    listen 443 ssl;
    server_name gitlab.krem.lan;

    # SSL/TLS Configuration
    ssl_certificate     /etc/ssl/certs/krem.lan.crt;
    ssl_certificate_key /etc/ssl/private/krem.lan.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # GitLab Application Limits & Timeouts
    client_max_body_size 0;
    proxy_read_timeout 600;
    proxy_connect_timeout 300;

    location / {
        # Reverse Proxy Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;

        proxy_pass http://gitlab_backend;
    }
}

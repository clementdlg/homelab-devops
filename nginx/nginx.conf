# /etc/nginx/nginx.conf

# ==============================
# 1. MAIN BLOCK
# ==============================

user nginx;
worker_processes auto; # Enable multiples workers per core
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
worker_rlimit_nofile 32768;


# ==============================
# 2. EVENTS BLOCK
# ==============================
events {
    # max number of simultaneous connections a worker can hold open
    worker_connections 16384;

	# accept all connections at once
    multi_accept on;
}


# ==============================
# 3. HTTP BLOCK
# ==============================
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

	# optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;

	# logging
    log_format json_combined escape=json 
    '{'
        '"time": "$time_iso8601",'
        '"client_ip": "$remote_addr",'
        '"request_method": "$request_method",'
        '"request_uri": "$request_uri",'
        '"server_protocol": "$server_protocol",'
        '"status": "$status",'
        '"body_bytes_sent": "$body_bytes_sent",'
        '"request_time": "$request_time",'
        '"upstream_response_time": "$upstream_response_time",'
        '"upstream_addr": "$upstream_addr",'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent",'
        '"http_x_forwarded_for": "$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    include /etc/nginx/conf.d/*.conf;
}

# ==============================
# 4. STREAM BLOCK 
# ==============================
stream {
	# logging
    log_format stream_json escape=json
    '{'
        '"time": "$time_iso8601",'
        '"client_ip": "$remote_addr",'
        '"protocol": "$protocol",'
        '"status": "$status",'
        '"bytes_sent": "$bytes_sent",'
        '"bytes_received": "$bytes_received",'
        '"session_time": "$session_time",'
        '"upstream_addr": "$upstream_addr",'
    '}';

    access_log /var/log/nginx/stream-access.log stream_json;

    # max time to establish a TCP handshake with the backend
    proxy_connect_timeout 3s;

    include /etc/nginx/stream.conf.d/*.conf;
}
